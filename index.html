<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ross de Lune</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --crema:#F5F0E8;
  --dorado:#C9A84C;
  --dorado-d:#7A4F2A;
  --morado:#6B4F7A;
  --texto:#3A2A1A;
  --rojo:#C0392B;
  --verde:#27AE60;
}
html,body{
  width:100%;min-height:100vh;
  background:var(--crema);
  font-family:"Lato",sans-serif;
  color:var(--texto);
}

/* ══ PANTALLA DE BIENVENIDA ══ */
#screen-welcome{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1rem 1.5rem 2.5rem;
}
body::before{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 20% 10%,rgba(201,168,76,.12) 0%,transparent 70%),
    radial-gradient(ellipse 50% 45% at 80% 90%,rgba(107,79,122,.09) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}
#screen-welcome > *{position:relative;z-index:1;}

.logo-wrap{width:min(380px,85vw);margin-bottom:1.2rem;position:relative;}
.logo-img{
  width:100%;height:auto;display:block;
  opacity:0;transform:scale(.92);
  filter:drop-shadow(0 8px 30px rgba(122,79,42,.28));
  animation:logo-appear 1.4s cubic-bezier(.2,.8,.3,1) .2s forwards;
}
@keyframes logo-appear{
  0%{opacity:0;transform:scale(.92)}
  65%{opacity:1;transform:scale(1.02)}
  100%{opacity:1;transform:scale(1)}
}
.logo-wrap::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 25%,rgba(255,240,170,.6) 48%,transparent 72%);
  background-size:220% 100%;background-position:-100% 0;
  animation:shimmer 1s ease 1.5s forwards;pointer-events:none;
}
@keyframes shimmer{
  0%{background-position:-100% 0;opacity:1}
  100%{background-position:240% 0;opacity:0}
}

.divider{
  width:130px;height:1px;
  background:linear-gradient(90deg,transparent,var(--dorado),transparent);
  margin:.4rem auto 1.8rem;
  opacity:0;animation:fade-up .6s ease 1.8s forwards;
}
.access-buttons{
  display:flex;flex-direction:column;gap:.85rem;
  width:min(290px,80vw);
  opacity:0;animation:fade-up .7s ease 2s forwards;
}
@keyframes fade-up{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.btn-access{
  display:flex;align-items:center;justify-content:center;gap:.65rem;
  padding:.88rem 1.4rem;border:none;border-radius:2px;cursor:pointer;
  font-family:"Lato",sans-serif;font-weight:300;
  letter-spacing:.18em;font-size:.76rem;text-transform:uppercase;
  transition:transform .15s,box-shadow .15s;
}
.btn-admin{background:linear-gradient(135deg,#7A4F2A,#C9A84C);color:#FFF8EC;box-shadow:0 3px 16px rgba(122,79,42,.38);}
.btn-worker{background:transparent;color:var(--dorado-d);border:1px solid var(--dorado);}
.btn-access:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(201,168,76,.32)}
.btn-access:active{transform:translateY(0)}
.footer-tag{
  position:fixed;bottom:1rem;
  font-size:.6rem;letter-spacing:.14em;color:#C5B49A;text-transform:uppercase;
  opacity:0;animation:fade-up .5s ease 2.6s forwards;
}

/* ══ MODAL LOGIN ══ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(30,18,8,.56);backdrop-filter:blur(5px);
  z-index:200;align-items:center;justify-content:center;padding:1rem;
}
.overlay.open{display:flex}
.modal{
  background:#fff;border-radius:3px;
  padding:2.2rem 2rem 2rem;
  width:min(360px,94vw);position:relative;
  box-shadow:0 20px 60px rgba(30,18,8,.28);
  animation:modal-in .3s cubic-bezier(.4,0,.2,1);
}
@keyframes modal-in{
  from{opacity:0;transform:scale(.95) translateY(10px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.badge{
  font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;
  color:#fff;background:var(--morado);
  display:inline-block;padding:.25rem .8rem;border-radius:20px;margin-bottom:1.1rem;
}
.modal-title{font-family:"Cormorant Garamond",serif;font-size:1.55rem;font-weight:300;color:var(--texto);margin-bottom:1.6rem;}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#888;margin-bottom:.4rem}
.field input{
  width:100%;border:none;border-bottom:1px solid #DDD;
  padding:.5rem 0;font-family:"Lato",sans-serif;font-size:.95rem;
  color:var(--texto);background:transparent;outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--dorado)}
.btn-primary{
  width:100%;padding:.85rem;margin-top:1.2rem;
  background:linear-gradient(135deg,#7A4F2A,#C9A84C);
  color:#FFF8EC;border:none;border-radius:2px;
  font-family:"Lato",sans-serif;font-size:.75rem;font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;
}
.btn-primary:hover{opacity:.88}
.btn-close{position:absolute;top:.9rem;right:1rem;background:none;border:none;font-size:1.3rem;color:#BBB;cursor:pointer}
.msg-error{font-size:.75rem;color:var(--rojo);margin-top:.7rem;min-height:1rem}
.msg-ok{font-size:.75rem;color:var(--verde);margin-top:.7rem;min-height:1rem}

/* ══ PANEL PRINCIPAL ══ */
#screen-panel{display:none;min-height:100vh;flex-direction:column;}
#screen-panel.show{display:flex}

/* topbar */
.topbar{
  background:linear-gradient(135deg,#7A4F2A,#C9A84C);
  color:#FFF8EC;
  padding:.9rem 1.4rem;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(122,79,42,.3);
  position:sticky;top:0;z-index:50;
}
.topbar-brand{font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:300;letter-spacing:.08em;}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.topbar-user{font-size:.72rem;letter-spacing:.1em;opacity:.85;}
.btn-logout-top{
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
  color:#FFF8EC;border-radius:2px;padding:.35rem .9rem;
  font-family:"Lato",sans-serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:background .2s;
}
.btn-logout-top:hover{background:rgba(255,255,255,.28)}

/* tabs */
.tabs{
  display:flex;border-bottom:1px solid #E8DDD0;
  background:#FFFDF9;
  padding:0 1.4rem;
}
.tab{
  padding:.85rem 1.2rem;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
  color:#AAA;cursor:pointer;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;white-space:nowrap;
}
.tab.active{color:var(--dorado-d);border-color:var(--dorado);}
.tab:hover{color:var(--dorado-d)}

/* contenido del panel */
.panel-content{flex:1;padding:1.4rem;max-width:900px;width:100%;margin:0 auto;}

/* sección */
.section{display:none;}
.section.active{display:block;}
.section-title{
  font-family:"Cormorant Garamond",serif;font-size:1.5rem;font-weight:300;
  color:var(--texto);margin-bottom:1.4rem;
  padding-bottom:.6rem;border-bottom:1px solid #E8DDD0;
}

/* card mi cuenta */
.card{
  background:#fff;border-radius:4px;padding:1.6rem;
  box-shadow:0 2px 12px rgba(122,79,42,.08);
  margin-bottom:1.2rem;
}
.card-title{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dorado-d);margin-bottom:1.2rem;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:500px){.form-row{grid-template-columns:1fr;}}

.field-inline{margin-bottom:.9rem;}
.field-inline label{display:block;font-size:.66rem;letter-spacing:.13em;text-transform:uppercase;color:#888;margin-bottom:.35rem;}
.field-inline input{
  width:100%;border:none;border-bottom:1px solid #DDD;
  padding:.45rem 0;font-family:"Lato",sans-serif;font-size:.9rem;
  color:var(--texto);background:transparent;outline:none;transition:border-color .2s;
}
.field-inline input:focus{border-color:var(--dorado)}

.btn-save{
  margin-top:.8rem;padding:.7rem 1.8rem;
  background:linear-gradient(135deg,#7A4F2A,#C9A84C);
  color:#FFF8EC;border:none;border-radius:2px;
  font-family:"Lato",sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;transition:opacity .2s;
}
.btn-save:hover{opacity:.88}

/* tabla colaboradores */
.workers-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.btn-new{
  padding:.55rem 1.2rem;
  background:transparent;color:var(--dorado-d);border:1px solid var(--dorado);
  border-radius:2px;font-family:"Lato",sans-serif;font-size:.7rem;
  letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;
}
.btn-new:hover{background:var(--dorado);color:#fff}

.workers-table{width:100%;border-collapse:collapse;font-size:.82rem;}
.workers-table th{
  text-align:left;padding:.6rem .8rem;
  font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
  color:#AAA;font-weight:400;border-bottom:1px solid #EEE;
}
.workers-table td{padding:.7rem .8rem;border-bottom:1px solid #F5F0E8;vertical-align:middle;}
.workers-table tr:last-child td{border-bottom:none}

.badge-role{
  font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.2rem .6rem;border-radius:20px;
}
.badge-admin{background:#F0E6D3;color:var(--dorado-d);}
.badge-worker{background:#EDE6F5;color:var(--morado);}

.badge-status{
  font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.2rem .6rem;border-radius:20px;
}
.badge-active{background:#E8F8EE;color:#1E8449;}
.badge-blocked{background:#FDEDEC;color:var(--rojo);}

.btn-icon-act{
  background:none;border:none;cursor:pointer;
  font-size:1rem;padding:.2rem .4rem;border-radius:3px;
  transition:background .15s;
}
.btn-icon-act:hover{background:#F5F0E8}

/* historial */
.log-entry{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:.7rem 0;border-bottom:1px solid #F5F0E8;
  font-size:.8rem;
}
.log-entry:last-child{border-bottom:none}
.log-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--dorado);margin-top:4px;flex-shrink:0;
}
.log-user{font-weight:400;color:var(--texto);}
.log-time{color:#AAA;font-size:.74rem;margin-top:.15rem;}
.log-role{font-size:.66rem;color:var(--morado);letter-spacing:.08em;}

/* spinner */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid #DDD;border-top-color:var(--dorado);
  border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:.4rem;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* modal colaborador */
#modal-worker .modal{max-width:400px;}

/* toast */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);
  background:#333;color:#fff;padding:.65rem 1.4rem;
  border-radius:3px;font-size:.78rem;letter-spacing:.06em;
  transition:transform .3s;z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#27AE60}
.toast.err{background:var(--rojo)}
</style>
</head>

<div class="toast" id="toast"></div>

<script>
const MASTER_KEY = "$2a$10$ppW0utPb9oiIW1mORBhvmOUl5ku2bouhhVmein6onI/EuvLqqR5jy";   // JSONBin → API Keys → Master Key
const ACCESS_KEY = "$2a$10$9VfaQRuaCX9fyS6yiO1dhuh5DeDt89523dzWLH/.6jPYvy3wOcPv.";   // JSONBin → API Keys → Access Keys
const BIN_ID     = "6a2f95d2da38895dfec1c3bb";       // JSONBin → Bins → BIN ID
const BIN_URL    = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let currentUser       = null;
let allUsers          = [];
let editingWorkerUser = null;

/* ═══════════════════════════
   JSONBIN helpers
═══════════════════════════ */
async function loadData() {
  const r = await fetch(BIN_URL + "/latest", {
    headers: {
      "X-Master-Key": MASTER_KEY,
      "X-Access-Key": ACCESS_KEY
    }
  });
  const j = await r.json();
  return j.record;
}

async function saveData(data) {
  await fetch(BIN_URL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": MASTER_KEY,
      "X-Access-Key": ACCESS_KEY
    },
    body: JSON.stringify(data)
  });
}

/* ═══════════════════════════
   TOAST
═══════════════════════════ */
function showToast(msg, type="ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + type;
  setTimeout(()=>t.classList.add("show"), 10);
  setTimeout(()=>t.classList.remove("show"), 3000);
}

/* ═══════════════════════════
   LOGIN
═══════════════════════════ */
let loginRole = "admin";

function openLogin(role) {
  loginRole = role;
  const a = role === "admin";
  document.getElementById("login-badge").textContent = a ? "Administrador" : "Colaborador";
  document.getElementById("login-title").textContent = a ? "Bienvenida de nuevo" : "Hola, ¿lista para crear?";
  document.getElementById("login-err").textContent = "";
  document.getElementById("inp-user").value = "";
  document.getElementById("inp-pass").value = "";
  document.getElementById("overlay-login").classList.add("open");
  setTimeout(()=>document.getElementById("inp-user").focus(), 80);
}

function closeLogin() {
  document.getElementById("overlay-login").classList.remove("open");
}

async function doLogin() {
  const u = document.getElementById("inp-user").value.trim().toLowerCase();
  const p = document.getElementById("inp-pass").value;
  const btn = document.getElementById("btn-do-login");
  const err = document.getElementById("login-err");
  err.textContent = "";
  btn.innerHTML = '<span class="spinner"></span>Verificando...';
  btn.disabled = true;

  try {
    const data = await loadData();
    allUsers = data.users || [];
    const match = allUsers.find(x => x.user===u && x.pass===p && x.role===loginRole);

    if (!match) {
      err.textContent = "Usuario o contraseña incorrectos.";
      btn.innerHTML = "Entrar"; btn.disabled = false;
      return;
    }
    if (match.blocked) {
      err.textContent = "Esta cuenta está bloqueada. Contacta al administrador.";
      btn.innerHTML = "Entrar"; btn.disabled = false;
      return;
    }

    // Registrar acceso
    const now = new Date().toLocaleString("es-MX",{timeZone:"America/Mexico_City",
      year:"numeric",month:"2-digit",day:"2-digit",
      hour:"2-digit",minute:"2-digit",second:"2-digit"});
    if (!match.accesos) match.accesos = [];
    match.accesos.unshift(now);
    if (match.accesos.length > 50) match.accesos = match.accesos.slice(0,50);

    // Actualizar en JSONBin
    const idx = allUsers.findIndex(x=>x.user===u);
    allUsers[idx] = match;
    await saveData({users: allUsers});

    currentUser = match;
    closeLogin();
    enterPanel();

  } catch(e) {
    err.textContent = "Error de conexión. Intenta de nuevo.";
    btn.innerHTML = "Entrar"; btn.disabled = false;
  }
}

/* ═══════════════════════════
   PANEL
═══════════════════════════ */
function enterPanel() {
  document.getElementById("screen-welcome").style.display = "none";
  document.getElementById("screen-panel").classList.add("show");
  document.getElementById("topbar-user").textContent = "@" + currentUser.user;

  // Si es colaborador, ocultar tab de colaboradores
  if (currentUser.role !== "admin") {
    document.getElementById("tab-colab").style.display = "none";
  }

  // Cargar datos de mi cuenta
  document.getElementById("my-display").value = currentUser.display || "";
  document.getElementById("my-user").value    = currentUser.user    || "";

  switchTab(document.querySelector(".tab.active"));
}

function doLogout() {
  currentUser = null; allUsers = [];
  document.getElementById("screen-panel").classList.remove("show");
  document.getElementById("screen-welcome").style.display = "flex";
  // Resetear tabs
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector("[data-tab='mi-cuenta']").classList.add("active");
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec-mi-cuenta").classList.add("active");
}

function switchTab(el) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  const tab = el.dataset.tab;
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("sec-"+tab).classList.add("active");

  if (tab==="colaboradores") loadWorkers();
  if (tab==="historial")     loadHistorial();
}

/* ═══════════════════════════
   MI CUENTA
═══════════════════════════ */
async function saveMyAccount() {
  const display = document.getElementById("my-display").value.trim();
  const user    = document.getElementById("my-user").value.trim().toLowerCase();
  const pass1   = document.getElementById("my-pass1").value;
  const pass2   = document.getElementById("my-pass2").value;
  const msg     = document.getElementById("my-account-msg");
  msg.style.color = "var(--rojo)"; msg.textContent = "";

  if (!display || !user) { msg.textContent="Nombre y usuario son obligatorios."; return; }
  if (pass1 && pass1!==pass2) { msg.textContent="Las contraseñas no coinciden."; return; }
  if (pass1 && pass1.length<6) { msg.textContent="La contraseña debe tener al menos 6 caracteres."; return; }

  // Verificar que el usuario no esté tomado por otro
  const duplicate = allUsers.find(x=>x.user===user && x.user!==currentUser.user);
  if (duplicate) { msg.textContent="Ese nombre de usuario ya está en uso."; return; }

  try {
    const data = await loadData();
    allUsers = data.users;
    const idx = allUsers.findIndex(x=>x.user===currentUser.user);
    allUsers[idx].display = display;
    allUsers[idx].user    = user;
    if (pass1) allUsers[idx].pass = pass1;
    currentUser = allUsers[idx];
    await saveData({users:allUsers});

    document.getElementById("topbar-user").textContent = "@"+user;
    document.getElementById("my-pass1").value="";
    document.getElementById("my-pass2").value="";
    msg.style.color="var(--verde)";
    msg.textContent="✓ Cambios guardados correctamente.";
    showToast("Cuenta actualizada ✓");
  } catch(e) {
    msg.textContent="Error al guardar. Intenta de nuevo.";
  }
}

/* ═══════════════════════════
   COLABORADORES
═══════════════════════════ */
async function loadWorkers() {
  const tbody = document.getElementById("workers-tbody");
  tbody.innerHTML = '<tr><td colspan="5" style="color:#AAA;font-size:.8rem;padding:1rem"><span class="spinner"></span>Cargando...</td></tr>';
  try {
    const data = await loadData();
    allUsers = data.users;
    renderWorkers(allUsers);
  } catch(e) {
    tbody.innerHTML='<tr><td colspan="5" style="color:var(--rojo)">Error de conexión.</td></tr>';
  }
}

function renderWorkers(users) {
  const tbody = document.getElementById("workers-tbody");
  tbody.innerHTML = "";
  users.forEach(u => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong style="font-weight:400">${u.display}</strong></td>
      <td style="color:#888">@${u.user}</td>
      <td><span class="badge-role ${u.role==='admin'?'badge-admin':'badge-worker'}">${u.role==='admin'?'Admin':'Colaborador'}</span></td>
      <td><span class="badge-status ${u.blocked?'badge-blocked':'badge-active'}">${u.blocked?'Bloqueado':'Activo'}</span></td>
      <td>
        <button class="btn-icon-act" title="Editar" onclick="openWorkerModal('${u.user}')">✏️</button>
        <button class="btn-icon-act" title="${u.blocked?'Desbloquear':'Bloquear'}" onclick="toggleBlock('${u.user}')">${u.blocked?'🔓':'🔒'}</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function openWorkerModal(username) {
  editingWorkerUser = username;
  document.getElementById("worker-modal-msg").textContent="";
  if (username) {
    const u = allUsers.find(x=>x.user===username);
    document.getElementById("worker-modal-badge").textContent = "Editar cuenta";
    document.getElementById("worker-modal-title").textContent = u.display;
    document.getElementById("w-display").value = u.display;
    document.getElementById("w-user").value    = u.user;
    document.getElementById("w-pass").value    = "";
    document.getElementById("w-pass").placeholder = "Dejar vacío para no cambiar";
  } else {
    document.getElementById("worker-modal-badge").textContent = "Nueva cuenta";
    document.getElementById("worker-modal-title").textContent = "Colaborador";
    document.getElementById("w-display").value="";
    document.getElementById("w-user").value="";
    document.getElementById("w-pass").value="";
    document.getElementById("w-pass").placeholder="••••••••";
  }
  document.getElementById("modal-worker").classList.add("open");
}

function closeWorkerModal() {
  document.getElementById("modal-worker").classList.remove("open");
}

async function saveWorker() {
  const display = document.getElementById("w-display").value.trim();
  const user    = document.getElementById("w-user").value.trim().toLowerCase();
  const pass    = document.getElementById("w-pass").value;
  const msg     = document.getElementById("worker-modal-msg");
  msg.textContent="";

  if (!display||!user) { msg.textContent="Nombre y usuario son obligatorios."; return; }
  if (!editingWorkerUser && !pass) { msg.textContent="La contraseña es obligatoria."; return; }
  if (pass && pass.length<6) { msg.textContent="Mínimo 6 caracteres."; return; }

  try {
    const data = await loadData();
    allUsers = data.users;

    if (editingWorkerUser) {
      // editar existente
      const idx = allUsers.findIndex(x=>x.user===editingWorkerUser);
      allUsers[idx].display = display;
      allUsers[idx].user    = user;
      if (pass) allUsers[idx].pass = pass;
    } else {
      // nueva cuenta
      const exists = allUsers.find(x=>x.user===user);
      if (exists) { msg.textContent="Ese usuario ya existe."; return; }
      allUsers.push({user,pass,display,role:"worker",blocked:false,accesos:[]});
    }

    await saveData({users:allUsers});
    closeWorkerModal();
    renderWorkers(allUsers);
    showToast(editingWorkerUser ? "Cuenta actualizada ✓" : "Cuenta creada ✓");
  } catch(e) {
    msg.textContent="Error al guardar.";
  }
}

async function toggleBlock(username) {
  try {
    const data = await loadData();
    allUsers = data.users;
    const idx = allUsers.findIndex(x=>x.user===username);
    allUsers[idx].blocked = !allUsers[idx].blocked;
    await saveData({users:allUsers});
    renderWorkers(allUsers);
    showToast(allUsers[idx].blocked ? "Cuenta bloqueada 🔒" : "Cuenta desbloqueada 🔓");
  } catch(e) {
    showToast("Error de conexión","err");
  }
}

/* ═══════════════════════════
   HISTORIAL
═══════════════════════════ */
async function loadHistorial() {
  const list = document.getElementById("log-list");
  list.innerHTML = '<span class="spinner"></span> Cargando...';
  try {
    const data = await loadData();
    const entries = [];
    (data.users||[]).forEach(u => {
      (u.accesos||[]).forEach(ts => {
        entries.push({display:u.display, user:u.user, role:u.role, ts});
      });
    });
    // Ordenar más reciente primero
    entries.sort((a,b)=> new Date(b.ts)-new Date(a.ts));

    if (!entries.length) {
      list.innerHTML='<p style="color:#AAA;font-size:.82rem">Sin registros aún.</p>';
      return;
    }
    list.innerHTML = entries.slice(0,60).map(e=>`
      <div class="log-entry">
        <div class="log-dot"></div>
        <div>
          <div class="log-user">${e.display} <span class="log-role">${e.role==='admin'?'Admin':'Colaborador'}</span></div>
          <div class="log-time">@${e.user} · ${e.ts}</div>
        </div>
      </div>`).join("");
  } catch(e) {
    list.innerHTML='<p style="color:var(--rojo)">Error de conexión.</p>';
  }
}
</script>
