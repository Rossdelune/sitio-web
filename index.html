<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ross de Lune</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --crema:#F5F0E8;
    --dorado:#C9A84C;
    --dorado-d:#7A4F2A;
    --morado:#6B4F7A;
    --texto:#3A2A1A;
  }
  html,body{
    width:100%;height:100%;
    background:var(--crema);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:"Lato",sans-serif;
    overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;
    background:
      radial-gradient(ellipse 70% 55% at 20% 10%, rgba(201,168,76,.12) 0%,transparent 70%),
      radial-gradient(ellipse 50% 45% at 80% 90%, rgba(107,79,122,.09) 0%,transparent 70%);
    pointer-events:none;
  }

  .stage{
    display:flex;flex-direction:column;align-items:center;
    padding:1rem 1.5rem 2rem;
    width:100%;
  }

  /* ── logo ── */
  .logo-wrap{
    width:min(380px,85vw);
    margin-bottom:1.4rem;
  }
  .logo-img{
    width:100%;height:auto;
    display:block;
    opacity:0;
    transform:scale(.92);
    filter:drop-shadow(0 8px 30px rgba(122,79,42,.28));
    animation:logo-appear 1.4s cubic-bezier(.2,.8,.3,1) .2s forwards;
  }
  @keyframes logo-appear{
    0%  {opacity:0;transform:scale(.92)}
    65% {opacity:1;transform:scale(1.02)}
    100%{opacity:1;transform:scale(1)}
  }

  /* brillo dorado que barre */
  .logo-wrap::after{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(105deg,
      transparent 25%,
      rgba(255,240,170,.6) 48%,
      transparent 72%);
    background-size:220% 100%;
    background-position:-100% 0;
    animation:shimmer 1s ease 1.5s forwards;
    pointer-events:none;
  }
  .logo-wrap{position:relative;}
  @keyframes shimmer{
    0%  {background-position:-100% 0;opacity:1}
    100%{background-position:240% 0;opacity:0}
  }

  /* ── divider ── */
  .divider{
    width:130px;height:1px;
    background:linear-gradient(90deg,transparent,var(--dorado),transparent);
    margin:.4rem auto 1.8rem;
    opacity:0;
    animation:fade-up .6s ease 1.8s forwards;
  }

  /* ── botones ── */
  .access-buttons{
    display:flex;flex-direction:column;gap:.85rem;
    width:min(290px,80vw);
    opacity:0;
    animation:fade-up .7s ease 2s forwards;
  }
  @keyframes fade-up{
    from{opacity:0;transform:translateY(8px)}
    to  {opacity:1;transform:translateY(0)}
  }
  .btn-access{
    display:flex;align-items:center;justify-content:center;gap:.65rem;
    padding:.88rem 1.4rem;border:none;border-radius:2px;cursor:pointer;
    font-family:"Lato",sans-serif;font-weight:300;
    letter-spacing:.18em;font-size:.76rem;text-transform:uppercase;
    transition:transform .15s,box-shadow .15s;
  }
  .btn-admin{
    background:linear-gradient(135deg,#7A4F2A,#C9A84C);
    color:#FFF8EC;
    box-shadow:0 3px 16px rgba(122,79,42,.38);
  }
  .btn-worker{
    background:transparent;color:var(--dorado-d);
    border:1px solid var(--dorado);
  }
  .btn-access:hover {transform:translateY(-2px);box-shadow:0 6px 22px rgba(201,168,76,.32)}
  .btn-access:active{transform:translateY(0)}

  .footer{
    position:fixed;bottom:1rem;
    font-size:.6rem;letter-spacing:.14em;color:#C5B49A;text-transform:uppercase;
    opacity:0;animation:fade-up .5s ease 2.6s forwards;
  }

  /* ══ MODAL ══ */
  .overlay{
    display:none;position:fixed;inset:0;
    background:rgba(30,18,8,.56);backdrop-filter:blur(5px);
    z-index:100;align-items:center;justify-content:center;padding:1rem;
  }
  .overlay.open{display:flex}
  .modal{
    background:#fff;border-radius:3px;
    padding:2.2rem 2rem 2rem;
    width:min(360px,94vw);position:relative;
    box-shadow:0 20px 60px rgba(30,18,8,.28);
    animation:modal-in .3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes modal-in{
    from{opacity:0;transform:scale(.95) translateY(10px)}
    to  {opacity:1;transform:scale(1)   translateY(0)}
  }
  .badge{
    font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;
    color:#fff;background:var(--morado);
    display:inline-block;padding:.25rem .8rem;border-radius:20px;margin-bottom:1.1rem;
  }
  .modal-title{
    font-family:"Cormorant Garamond",serif;font-size:1.55rem;
    font-weight:300;color:var(--texto);margin-bottom:1.6rem;
  }
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#888;margin-bottom:.4rem}
  .field input{
    width:100%;border:none;border-bottom:1px solid #DDD;
    padding:.5rem 0;font-family:"Lato",sans-serif;font-size:.95rem;
    color:var(--texto);background:transparent;outline:none;transition:border-color .2s;
  }
  .field input:focus{border-color:var(--dorado)}
  .btn-enter{
    margin-top:1.4rem;width:100%;padding:.85rem;
    background:linear-gradient(135deg,#7A4F2A,#C9A84C);
    color:#FFF8EC;border:none;border-radius:2px;
    font-family:"Lato",sans-serif;font-size:.75rem;font-weight:400;
    letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;
  }
  .btn-enter:hover{opacity:.88}
  .btn-close{position:absolute;top:.9rem;right:1rem;background:none;border:none;font-size:1.3rem;color:#BBB;cursor:pointer}
  .error-msg{font-size:.75rem;color:#C0392B;margin-top:.7rem;min-height:1rem}

  /* ══ INNER ══ */
  .inner-screen{
    display:none;position:fixed;inset:0;background:var(--crema);z-index:200;
    flex-direction:column;align-items:center;justify-content:center;
  }
  .inner-screen.show{display:flex;animation:fade-up .4s ease}
  .inner-tag {font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--morado);margin-bottom:.5rem}
  .inner-name{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:300;color:var(--texto);margin-bottom:.4rem}
  .inner-user{font-size:.8rem;color:#999;letter-spacing:.1em;margin-bottom:1.5rem}
  .inner-note{font-size:.78rem;color:#BBB;font-style:italic}
  .btn-logout{
    margin-top:2.5rem;background:none;border:1px solid #DDD;
    padding:.6rem 1.8rem;font-family:"Lato",sans-serif;font-size:.7rem;
    letter-spacing:.18em;text-transform:uppercase;color:#AAA;border-radius:2px;
    cursor:pointer;transition:border-color .2s,color .2s;
  }
  .btn-logout:hover{border-color:var(--dorado);color:var(--dorado-d)}
</style>
</head>
